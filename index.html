<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fceabb, #f8b500);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            text-align: center;
        }

        .card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 3rem;
            color: #d35400;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .audio-container {
            margin-top: 20px;
            padding: 15px;
            background: #fff5e6;
            border-radius: 50px;
        }

        audio {
            width: 100%;
        }

        .emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="emoji">🎂</span>
        <h1>Happy Birthday!</h1>
        <p>Wishing you a day filled with laughter, joy, and plenty of cake. You deserve the best year yet!</p>
        
        <div class="audio-container">
            <audio controls autoplay>
                <source src="2rachaelz.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <p style="font-size: 0.8rem; margin: 10px 0 0 0;">Press play for your birthday song!</p>
        </div>
    </div>

</body>
</html>
